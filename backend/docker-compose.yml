services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file:
      - path: .env
        required: false
    volumes:
      - ./src:/app/src
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
