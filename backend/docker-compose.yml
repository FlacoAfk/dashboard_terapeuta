version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Las demás variables de entorno se cargarán desde el archivo .env si existe
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
