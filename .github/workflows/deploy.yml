name: Deploy Production

on:
  push:
    branches: [deploy]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend to Railway
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: Deploy frontend to Railway
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  RAILWAY_BACKEND_URL: ${{ vars.RAILWAY_BACKEND_URL }}
  RAILWAY_FRONTEND_URL: ${{ vars.RAILWAY_FRONTEND_URL }}

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build web frontend
        run: npm run build:web

  deploy_backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.event_name == 'push' || inputs.deploy_backend == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway credentials
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Missing secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "${{ env.RAILWAY_BACKEND_URL }}" ]; then
            echo "Missing variable: RAILWAY_BACKEND_URL"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm i -g @railway/cli@latest

      - name: Deploy backend service
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

      - name: Verify deployment
        run: |
          URL="${RAILWAY_BACKEND_URL}"
          curl -f "$URL/health"
          curl -f "$URL/health/live"
          curl -f "$URL/health/ready"

  deploy_frontend:
    name: Deploy Frontend (Railway)
    runs-on: ubuntu-latest
    needs: quality_gate
    if: github.event_name == 'push' || inputs.deploy_frontend == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway credentials
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Missing secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "${{ env.RAILWAY_FRONTEND_URL }}" ]; then
            echo "Missing variable: RAILWAY_FRONTEND_URL"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm i -g @railway/cli@latest

      - name: Deploy frontend-web service
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service frontend-web --detach

      - name: Verify deployment
        run: curl -f "${RAILWAY_FRONTEND_URL}/health"
