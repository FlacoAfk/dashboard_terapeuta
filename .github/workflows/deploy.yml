name: Deploy Production
run-name: 'Deploy • ${{ github.ref_name }} • #${{ github.run_number }}'

on:
  push:
    branches: [deploy]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend to Cloud Run
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: Deploy frontend to Vercel
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  UNITY_API_KEY_SECRET: ${{ vars.UNITY_API_KEY_SECRET }}
  UNITY_API_KEY_SECRET_VERSION: ${{ vars.UNITY_API_KEY_SECRET_VERSION }}
  UNITY_SMOKE_TOKEN: ${{ vars.UNITY_SMOKE_TOKEN }}

jobs:
  policy_gate:
    name: Deploy Policy Gate
    runs-on: ubuntu-latest
    outputs:
      allow_deploy: ${{ steps.decision.outputs.allow_deploy }}

    steps:
      - id: decision
        name: Evaluate deploy policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "allow_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch detected: deploy allowed."
            exit 0
          fi

          RESPONSE=$(curl -sS \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls")

          PR_COUNT=$(echo "$RESPONSE" | jq 'length')

          if [ "$PR_COUNT" -eq 0 ]; then
            echo "allow_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Direct push detected on deploy branch. Deploy will be skipped (no PR association)."
            exit 0
          fi

          echo "allow_deploy=true" >> "$GITHUB_OUTPUT"
          echo "PR association verified ($PR_COUNT PR found)."

  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [policy_gate]
    if: needs.policy_gate.outputs.allow_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build web frontend
        run: npm run build:web

  deploy_backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: [policy_gate, quality_gate]
    if: needs.policy_gate.outputs.allow_deploy == 'true' && (github.event_name == 'push' || inputs.deploy_backend == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend credentials
        run: |
          GCP_SA_KEY_JSON='${{ secrets.GCP_SA_KEY }}'

          if [ -z "$GCP_SA_KEY_JSON" ]; then
            echo "Missing secret: GCP_SA_KEY"
            exit 1
          fi

          if [ -z "${UNITY_API_KEY_SECRET}" ]; then
            echo "Missing variable: UNITY_API_KEY_SECRET"
            echo "Set it to your Secret Manager secret name (example: dashboard-unity-api-key)."
            exit 1
          fi

          if [ -z "${UNITY_API_KEY_SECRET_VERSION}" ]; then
            echo "Missing variable: UNITY_API_KEY_SECRET_VERSION"
            echo "Set a pinned secret version (example: 4). Avoid using latest to prevent drift."
            exit 1
          fi

          if [ "${UNITY_API_KEY_SECRET_VERSION}" = "latest" ]; then
            echo "UNITY_API_KEY_SECRET_VERSION must be pinned (example: 4), not latest."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          PROJECT_ID="${GCP_PROJECT_ID:-cerebroalfuego}"
          REGION="${GCP_REGION:-us-central1}"
          gcloud config set project "$PROJECT_ID"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          PROJECT_ID="${GCP_PROJECT_ID:-cerebroalfuego}"
          REGION="${GCP_REGION:-us-central1}"
          REPO="${GCP_ARTIFACT_REPO:-dashboard-backend}"
          TAG="gha-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/dashboard-backend:${TAG}"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          docker build -f backend/Dockerfile -t "$IMAGE" backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          PROJECT_ID="${GCP_PROJECT_ID:-cerebroalfuego}"
          REGION="${GCP_REGION:-us-central1}"
          SERVICE="${CLOUD_RUN_SERVICE:-cerebro-al-fuego-image}"
          UNITY_SECRET_NAME="${UNITY_API_KEY_SECRET}"
          UNITY_SECRET_VERSION="${UNITY_API_KEY_SECRET_VERSION}"

          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --update-secrets "UNITY_API_KEY=${UNITY_SECRET_NAME}:${UNITY_SECRET_VERSION}" \
            --quiet

          URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')

          echo "Cloud Run URL: $URL"
          curl -f "$URL/health"
          curl -f "$URL/health/live"
          curl -f "$URL/health/ready"

      - name: Smoke test Unity auth contract
        run: |
          PROJECT_ID="${GCP_PROJECT_ID:-cerebroalfuego}"
          REGION="${GCP_REGION:-us-central1}"
          SERVICE="${CLOUD_RUN_SERVICE:-cerebro-al-fuego-image}"
          UNITY_SECRET_NAME="${UNITY_API_KEY_SECRET}"
          UNITY_SECRET_VERSION="${UNITY_API_KEY_SECRET_VERSION}"
          TOKEN="${UNITY_SMOKE_TOKEN:-A5G7Z4}"

          URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')

          API_KEY=$(gcloud secrets versions access "$UNITY_SECRET_VERSION" \
            --secret="$UNITY_SECRET_NAME" \
            --project "$PROJECT_ID" | tr -d '\r\n')

          if [ -z "$API_KEY" ]; then
            echo "Secret ${UNITY_SECRET_NAME}:${UNITY_SECRET_VERSION} is empty or inaccessible"
            exit 1
          fi

          NO_AUTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL/api/sessions/by-token/$TOKEN")

          WITH_AUTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-API-Key: $API_KEY" \
            "$URL/api/sessions/by-token/$TOKEN")

          echo "No-auth status: $NO_AUTH_CODE"
          echo "With-auth status: $WITH_AUTH_CODE"

          if [ "$NO_AUTH_CODE" != "401" ]; then
            echo "Expected 401 without API key, got $NO_AUTH_CODE"
            exit 1
          fi

          if [ "$WITH_AUTH_CODE" = "401" ]; then
            echo "Expected non-401 with valid API key, got 401"
            exit 1
          fi

  deploy_frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [policy_gate, quality_gate]
    if: needs.policy_gate.outputs.allow_deploy == 'true' && (github.event_name == 'push' || inputs.deploy_frontend == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel credentials
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "${{ vars.VERCEL_ORG_ID }}" ]; then
            echo "Missing variable: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "${{ vars.VERCEL_PROJECT_ID }}" ]; then
            echo "Missing variable: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build frontend artifacts
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
